# Continuous integration — runs on every pull request and on pushes to main.
#
# Gate: the TypeScript test suite AND the PHP test suite must pass, and the
# assets must build cleanly (Sass + Vite → package/theme/dist/). The TS-test +
# build pair mirrors the release workflow; the PHP suite is gated here too so
# the server-side endpoints (request-shape validation in save.php, the
# disks.ini → MainPageState mapping in main-state.php) can't regress unnoticed
# between dev-box runs.
#
# A parallel `lint` job enforces code formatting: Biome (formatter + a tuned
# linter) over the TS/JS, and PHP-CS-Fixer (@PSR12) over the server-side PHP.
# Both run in check-only mode and fail the build on any unformatted file. Run
# `npm run format` locally to auto-fix before pushing.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel an in-progress run when new commits land on the same branch/PR — no
# point burning minutes validating a commit that's already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Formatting/lint gate — fails the build on any unformatted TS/JS or PHP file.
  # Kept separate from `test` so a style failure reads distinctly from a logic
  # failure, and the two jobs run concurrently.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # PHP-CS-Fixer runs under PHP; 8.2 matches Unraid 7.x. The pinned
      # php-cs-fixer.phar is fetched on demand by tools/php-cs-fixer.mjs.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: npm ci

      - name: Lint TS/JS (Biome)
        run: npm run lint:js

      - name: Lint PHP (PHP-CS-Fixer, @PSR12)
        run: npm run lint:php

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # PHP 8.2 matches the runtime shipped with Unraid 7.x. zend.assertions is
      # forced on at the CLI by run-all.mjs, so the assert()s in the .test.php
      # files are real failures here.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: npm ci

      # Fail fast if package.json / package-lock.json / the .plg ENTITY drift.
      - name: Check version sync
        run: npm run version:check

      - name: Run TS tests
        run: npm run test:ts

      - name: Run PHP tests
        run: npm run test:php

      - name: Build assets
        run: npm run build

      # The /Main + Unassigned Devices snapshot endpoints are READ-ONLY by
      # contract — no external HTTP, no shelling out. Fail the build if a
      # blocking/exec primitive sneaks in.
      - name: Guard read-only PHP endpoints
        run: |
          if grep -nE 'curl_exec|shell_exec|proc_open|popen|\bexec\(|\bsystem\(|\bpassthru\(|wget |file_get_contents\(["'\'']https?:|fopen\(["'\'']https?:' \
              package/include/main-state.php package/include/ud-state.php; then
            echo "::error::main-state.php / ud-state.php must stay read-only (no external HTTP / shelling)."
            exit 1
          fi
          echo "Read-only endpoint guard passed."

      # main-smart.php DOES shell out (SMART has no on-disk source), but the
      # ONLY binary it may invoke is /usr/sbin/smartctl, and only via a single
      # escapeshellarg'd exec() boundary. Forbid all other exec/network
      # primitives (incl. the backtick operator), and assert the smartctl path
      # + escaping are present. We check CODE only — `//` line comments are
      # stripped first so markdown backticks/words in prose don't false-trip.
      - name: Guard main-smart.php (smartctl-only)
        run: |
          code="$(sed 's|//.*||' package/include/main-smart.php)"
          if printf '%s\n' "$code" | grep -nE 'curl_exec|shell_exec|proc_open|popen|\bsystem\(|\bpassthru\(|`|wget |file_get_contents\(["'\'']https?:|fopen\(["'\'']https?:'; then
            echo "::error::main-smart.php may only invoke smartctl via exec() — no other exec/network primitive."
            exit 1
          fi
          if [ "$(printf '%s\n' "$code" | grep -cE '\bexec\(')" -ne 1 ]; then
            echo "::error::main-smart.php must contain exactly one exec() boundary."
            exit 1
          fi
          if ! grep -qE "MODERNUI_SMARTCTL\s*=\s*'/usr/sbin/smartctl'" package/include/main-smart.php; then
            echo "::error::main-smart.php must hardcode the smartctl binary path."
            exit 1
          fi
          if ! grep -q 'escapeshellarg' package/include/main-smart.php; then
            echo "::error::main-smart.php must escapeshellarg every command token."
            exit 1
          fi
          echo "main-smart.php guard passed."
